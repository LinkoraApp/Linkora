<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Linkora</title>
    <link href="styles.css" rel="stylesheet" type="text/css"/>
</head>
<body style="text-align: center; align-content: center;">
<div id="loading">
    <svg height="40" role="presentation" viewBox="0 0 50 50" width="40"
         xmlns="http://www.w3.org/2000/svg">
        <circle cx="25" cy="25" fill="none" r="20" stroke="#ccc" stroke-width="4"></circle>
        <circle cx="25" cy="25" fill="none" r="20" stroke="#333" stroke-dasharray="90 125"
                stroke-linecap="round" stroke-width="4">
            <animateTransform attributeName="transform" dur="1s" from="0 25 25" repeatCount="indefinite"
                              to="360 25 25" type="rotate"></animateTransform>
        </circle>
    </svg>
</div>

<div hidden id="blocked">
    <h2>Linkora is already open in another tab</h2>
    <p>Only one Linkora tab is allowed at a time.</p>
    <p>This is required to reduce OPFS locking conflicts and protect data integrity for the local
        database.</p>
    <p>Please close the existing Linkora tab and open this tab again.</p>
</div>

<script>
    (async function () {
      const loading = document.getElementById("loading");
      const blocked = document.getElementById("blocked");

      function loadApp() {
        const script = document.createElement("script");
        script.type = "module";
        script.src = "composeApp.js";
        document.body.appendChild(script);
      }

      if (!("locks" in navigator)) {
        loadApp();
        return;
      }

      await navigator.locks.request(
        "linkora-single-tab-lock",
        { ifAvailable: true, mode: "exclusive" },
        async (lock) => {
          if (!lock) {
            loading.hidden = true;
            blocked.hidden = false;
            return;
          }

          loadApp();

          await new Promise(() => {});
        }
      );
    })();
</script>
</body>
</html>
